services:
  postgres:
    image: postgres:15
    container_name: postgres-assrone
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assrone_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assrone_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: